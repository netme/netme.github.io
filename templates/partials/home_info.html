<article class="first-entry home-info home-profile">
    <div class="home-profile-media">
        <img src="{{ get_url(path='netme.jpg') }}" alt="Portrait of Mikhail Chernykh" class="home-profile-image">
    </div>
    <div class="home-profile-copy">
        <header class="entry-header">
            <h1>{{ config.extra.papermod.home_title }}</h1>
        </header>
        <div class="entry-content">
            {{ config.extra.papermod.home_content | markdown(inline=true) | safe }}
        </div>
        <footer class="entry-footer">
            {% include "partials/social_icons.html" %}
        </footer>
    </div>
</article>
